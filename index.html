<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date-Anfrage ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    height:100vh;
    overflow:hidden;
    background: linear-gradient(135deg,#ff9ecf,#ffd6e8);
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    text-align:center;
    max-width:500px;
    width:90%;
    z-index:10;
}

h1{
    color:#ff4f8b;
    margin-bottom:20px;
}

p{
    margin-bottom:20px;
}

button{
    border:none;
    padding:14px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.yes{
    background:#ff4f8b;
    color:white;
}

.yes:hover{
    transform:scale(1.05);
}

.no{
    background:#ddd;
    position:absolute;
}

#form{
    display:none;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation:float 8s linear infinite;
    opacity:.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}
</style>
</head>
<body>

<div class="card" id="start">

    <h1>❤️ Eine wichtige Frage ❤️</h1>

    <p>
        Seit einiger Zeit wollte ich dich etwas fragen...
    </p>

    <h2 style="margin-bottom:25px;">
        Willst du mit mir auf ein Date gehen?
    </h2>

    <button class="yes" onclick="showForm()">
        Ja 😍
    </button>

    <button id="noBtn" class="no">
        Nein 🙈
    </button>

</div>

<div class="card" id="form">

    <h1>🥰 Jaaa!</h1>

    <p>Dann planen wir direkt unser Date.</p>

    <input type="date" id="date">

    <input type="time" id="time">

    <input
        type="text"
        id="place"
        placeholder="Wo treffen wir uns?"
    >

    <button class="yes" onclick="confirmDate()">
        Date bestätigen ❤️
    </button>

</div>

<script>

const noBtn = document.getElementById("noBtn");

function moveButton(){

    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 70);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function showForm(){

    document.getElementById("start").style.display="none";
    document.getElementById("form").style.display="block";
}

function launchConfetti(){

    for(let i=0;i<120;i++){

        const conf = document.createElement("div");

        conf.innerHTML = ["🎉","❤️","✨"][Math.floor(Math.random()*3)];

        conf.style.position="fixed";
        conf.style.left=Math.random()*100+"vw";
        conf.style.top="-20px";
        conf.style.fontSize=(15+Math.random()*20)+"px";

        document.body.appendChild(conf);

        const duration = 2000 + Math.random()*2000;

        conf.animate([
            {transform:"translateY(0) rotate(0deg)"},
            {transform:`translateY(${window.innerHeight+200}px) rotate(720deg)`}
        ],{
            duration:duration,
            easing:"linear"
        });

        setTimeout(()=>conf.remove(),duration);
    }
}

function confirmDate(){

    launchConfetti();

    setTimeout(()=>{

        document.body.innerHTML=`
        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            flex-direction:column;
            font-family:Segoe UI;
            background:linear-gradient(135deg,#ff9ecf,#ffd6e8);
        ">
            <h1>❤️ Perfekt! ❤️</h1>
            <h2>Ich freue mich riesig auf unser Date! 🥰</h2>
            <p style="margin-top:20px;font-size:20px;">
                Bis ganz bald ✨
            </p>
        </div>
        `;

    },1000);
}

for(let i=0;i<25;i++){

    const heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(5+Math.random()*6)+"s";
    heart.style.fontSize=(15+Math.random()*25)+"px";

    document.body.appendChild(heart);
}
</script>

</body>
</html>
